<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Omni360 Product Brain</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth" class="auth-screen">
    <form id="loginForm" class="auth-card">
      <h1>Omni360 Product Brain</h1>
      <p>Вход в редактор требований</p>
      <label>Email<input id="email" type="email" required autocomplete="username"></label>
      <label>Пароль<input id="password" type="password" required autocomplete="current-password"></label>
      <button class="primary" type="submit">Войти</button>
      <div id="authMessage" class="message"></div>
    </form>
  </div>

  <div id="app" hidden>
    <header>
      <div class="topline">
        <h1>Omni360 Product Brain · редактор требований</h1>
        <div class="session"><span id="userEmail"></span><button id="logout">Выйти</button></div>
      </div>
      <div class="bar">
        <input id="q" placeholder="Поиск по исходному и продуктовому тексту">
        <select id="statusFilter"><option value="">Все статусы</option></select>
        <select id="priorityFilter"><option value="">Все приоритеты</option></select>
        <select id="tagFilter"><option value="">Все теги</option></select>
        <button id="newRequest" class="primary">Новый реквест</button>
        <button id="importSeed">Импортировать исходные реквесты</button>
        <button id="export">Экспорт JSON</button>
        <button id="reset" class="primary">Сбросить фильтры</button>
      </div>
      <div id="syncStatus" class="sync-status">Готово</div>
    </header>

    <main>
      <aside class="card sidebar">
        <b>Категории</b>
        <div class="category-tools">
          <input id="newCategory" placeholder="Новая категория">
          <button id="addCategory" type="button">Добавить категорию</button>
        </div>
        <div id="nav"></div>
        <hr>
        <b>Статусы</b>
        <div class="category-tools">
          <input id="newStatus" placeholder="Новый статус">
          <button id="addStatus" type="button">Добавить статус</button>
        </div>
        <div id="statusLegend"></div>
      </aside>
      <section class="card list"><div class="head" id="head">Реквесты</div><div id="list"></div></section>
      <aside class="card details" id="details"><div class="empty">Выберите реквест</div></aside>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
